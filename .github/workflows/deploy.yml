name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build assets
        run: npm ci && npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer build files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SERVER_PORT }}" \
            public/build/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/yogo.dev/parka-ojisan/public/build/

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e
            cd ~/yogo.dev/parka-ojisan
            git pull origin main
            /usr/bin/php8.4 /usr/bin/composer install --no-dev --optimize-autoloader
            /usr/bin/php8.4 artisan migrate --force
            /usr/bin/php8.4 artisan config:cache
            /usr/bin/php8.4 artisan route:cache
            /usr/bin/php8.4 artisan view:cache
          EOF
